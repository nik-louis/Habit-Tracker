name: Create release and attach HTML

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create ZIP archive
        run: |
          zip release.zip \
            icon-192.png \
            icon-512.png \
            index.html \
            manifest.json \
            sw.js

      - name: Create or update release and attach ZIP
        uses: softprops/action-gh-release@v2
        with:
          files: release.zip
