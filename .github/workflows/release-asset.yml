name: Create release and attach HTML

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or update release and attach index.html
        uses: softprops/action-gh-release@v2
        with:
          files: index.html
